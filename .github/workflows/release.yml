name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.abi_target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - native_arch: arm
            abi_id: 1
            abi_target: armeabi-v7a
          - native_arch: arm64
            abi_id: 2
            abi_target: arm64-v8a
          - native_arch: '386'
            abi_id: 3
            abi_target: x86
          - native_arch: amd64
            abi_id: 4
            abi_target: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify tag matches versionName
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(awk -F '"' '/versionName *=/ {print $2}' app/build.gradle.kts)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match build.gradle.kts versionName=$GRADLE_VERSION"
            exit 1
          fi

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Android NDK
        run: |
          NDK_VERSION=$(awk -F '"' '/ndkVersion/ {print $2}' app/build.gradle.kts)
          yes | sdkmanager --install "ndk;$NDK_VERSION" --channel=3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: XrayCore/go.mod
          cache: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build XrayCore (${{ matrix.native_arch }})
        run: ./buildXrayCore.sh ${{ matrix.native_arch }}

      - name: Build XrayHelper (${{ matrix.native_arch }})
        run: ./buildXrayHelper.sh ${{ matrix.native_arch }}

      - name: Decode keystore
        env:
          KS_FILE: ${{ secrets.KS_FILE }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          printf '%s' "$KS_FILE" | base64 -d > "$RUNNER_TEMP/keys/yaxc.jks"
          echo "KS_FILE_PATH=$RUNNER_TEMP/keys/yaxc.jks" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            -PabiId=${{ matrix.abi_id }} \
            -PabiTarget=${{ matrix.abi_target }} \
            :app:assembleRelease

      - name: Stage APK
        run: |
          BASE=$(cat app/versionCode.txt)
          VC=$((BASE + ${{ matrix.abi_id }}))
          mkdir -p dist
          mv "app/build/outputs/apk/release/app-${{ matrix.abi_target }}-release.apk" \
             "dist/yaxc-${GITHUB_REF_NAME}-${{ matrix.abi_target }}-${VC}.apk"

      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/yaxc.jks"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaxc-${{ matrix.abi_target }}
          path: dist/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: yaxc-*
          merge-multiple: true

      - name: Resolve release notes
        id: notes
        run: |
          BASE=$(cat app/versionCode.txt)
          VC=$((BASE + 4))
          CHANGELOG="metadata/en-US/changelogs/${VC}.txt"
          if [ -f "$CHANGELOG" ]; then
            {
              echo "body<<EOF"
              cat "$CHANGELOG"
              echo
              echo
              echo "Build matrix: armeabi-v7a, arm64-v8a, x86, x86_64"
              echo "Base versionCode: $BASE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF"
              echo "Release $GITHUB_REF_NAME"
              echo
              echo "- Signed APKs are attached below."
              echo "- Build matrix: armeabi-v7a, arm64-v8a, x86, x86_64"
              echo "- Base versionCode: $BASE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          draft: false
          files: dist/*.apk
          body: ${{ steps.notes.outputs.body }}
          fail_on_unmatched_files: true
